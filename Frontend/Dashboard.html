<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Css/dashboardStyles.css">
    <title>Document</title>
</head>
<body>
    <header>
        <div class="nav">
            <img class="logo" src="Statics/logo-dentista.png" alt="logo de clinica dentista">
            <div class="datos-admin">
                <span>Administrador</span>
                <img class="logo-admin" src="Statics/logo-admin.jpg" alt="administrador">
            </div>
        </div>
        
    </header>
    <div class="linea"></div>
        <div>
            <div class="contenedor-saludo">
                <h1>Administracion de citas</h1>

                <p>Buenos dias, Mario. </p>

                <p>Gestiona las citas de los pacientes.</p>

                <h3>Ultima actualizacion: <span id="actualizacion"></span></h3>
            </div>

            <div class="contenedor">
            <div class="contenedor-tarjeta">
                <div class="tarjeta tarjeta-totales">
                    <div>
                        <div class="linea-totales"></div>
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6">
                        <path fill-rule="evenodd" d="M6.75 2.25A.75.75 0 0 1 7.5 3v1.5h9V3A.75.75 0 0 1 18 3v1.5h.75a3 3 0 0 1 3 3v11.25a3 3 0 0 1-3 3H5.25a3 3 0 0 1-3-3V7.5a3 3 0 0 1 3-3H6V3a.75.75 0 0 1 .75-.75Zm13.5 9a1.5 1.5 0 0 0-1.5-1.5H5.25a1.5 1.5 0 0 0-1.5 1.5v7.5a1.5 1.5 0 0 0 1.5 1.5h13.5a1.5 1.5 0 0 0 1.5-1.5v-7.5Z" clip-rule="evenodd" />
                        </svg>
                    </div>
                    <div>
                        <h2 id="totales">0</h2>
                    <span>citas totales</span>
                    </div>
                </div>
                <div class="tarjeta tarjeta-pendientes">
                    <div>
                        <div class="linea-pendientes"></div>
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6">
                        <path fill-rule="evenodd" d="M12 2.25c-5.385 0-9.75 4.365-9.75 9.75s4.365 9.75 9.75 9.75 9.75-4.365 9.75-9.75S17.385 2.25 12 2.25ZM12.75 6a.75.75 0 0 0-1.5 0v6c0 .414.336.75.75.75h4.5a.75.75 0 0 0 0-1.5h-3.75V6Z" clip-rule="evenodd" />
                        </svg>
                    </div>
                    <div>
                        <h2 id="pendientes">0</h2>
                    <span>Pendientes</span>
                    </div>
                </div>
                <div class="tarjeta tarjeta-confirmadas">
                    <div>
                        <div class="linea-confirmada"></div>
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6">
                        <path fill-rule="evenodd" d="M19.916 4.626a.75.75 0 0 1 .208 1.04l-9 13.5a.75.75 0 0 1-1.154.114l-6-6a.75.75 0 0 1 1.06-1.06l5.353 5.353 8.493-12.74a.75.75 0 0 1 1.04-.207Z" clip-rule="evenodd" />
                        </svg>
                    </div>
                    <div>
                        <h2 id="confirmadas">0</h2>
                        <span>Confirmadas</span>
                    </div>
                </div>
                <div class="tarjeta tarjeta-canceladas">
                    <div>
                        <div class="linea-cancelada"></div>
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6">
                        <path fill-rule="evenodd" d="M5.47 5.47a.75.75 0 0 1 1.06 0L12 10.94l5.47-5.47a.75.75 0 1 1 1.06 1.06L13.06 12l5.47 5.47a.75.75 0 1 1-1.06 1.06L12 13.06l-5.47 5.47a.75.75 0 0 1-1.06-1.06L10.94 12 5.47 6.53a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd" />
                        </svg>
                    </div>
                    <div>
                        <h2 id="canceladas">0</h2>
                        <span>Canceladas</span>
                    </div>
                </div>
            </div>
        </div>
        </div>

        <div class="linea"></div>
    <div class="contenedor-formulario" id="formulario">
        <div  class="formulario">
            <div class="grupo-datos">
                <label for="">Nombre</label>
                <input type="text" id="nombre" placeholder="Juan Alberto">
            </div>

            <div class="grupo-datos">
                <label for="">Apellidos</label>
                <input type="text" id="apellidos" placeholder="Rodriguez Hernandez">
            </div>

            <div class="grupo-datos span-2">
                <label for="">Fecha</label>
                <input type="date" id="fecha" ">
            </div>

            <div class="grupo-datos span-2">
                <label for="">Hora</label>
                <input type="time" id="hora">
            </div>

            <div class="grupo-datos span-2">
                <label for="">Numero telefono</label>
                <input type="number" id="numero" placeholder="961669933">
            </div>

            <button id="btn_guardar" class="span-2">Guardar cita</button>
            <button id="btn_cancelar" class="span-2">cancelar</button>


        </div>
    </div>
    
    <div class="herramientas">
        <div class="buscador">
            <span><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="m15.75 15.75-2.489-2.489m0 0a3.375 3.375 0 1 0-4.773-4.773 3.375 3.375 0 0 0 4.774 4.774ZM21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
            </svg>
            </span>
            <input id="buscar" type="search" placeholder="Bucar paciente">
        </div>

        <div class="filtro-estado">
            
            <select name="" id="">
                <option value="Confirmado">Confirmado</option>
                <option value="Pendiente">Pendiente</option>
                <option value="Canceladas">Canceladas</option>
            </select>
        </div>

        <div class="input-fecha">
            <span><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6">
            <path fill-rule="evenodd" d="M6.75 2.25A.75.75 0 0 1 7.5 3v1.5h9V3A.75.75 0 0 1 18 3v1.5h.75a3 3 0 0 1 3 3v11.25a3 3 0 0 1-3 3H5.25a3 3 0 0 1-3-3V7.5a3 3 0 0 1 3-3H6V3a.75.75 0 0 1 .75-.75Zm13.5 9a1.5 1.5 0 0 0-1.5-1.5H5.25a1.5 1.5 0 0 0-1.5 1.5v7.5a1.5 1.5 0 0 0 1.5 1.5h13.5a1.5 1.5 0 0 0 1.5-1.5v-7.5Z" clip-rule="evenodd" />
            </svg>
            </span>
            <input type="date">
        </div>

        <div>
            <button id="btn_abrir"> <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6 icon-plus">
                <path fill-rule="evenodd" d="M12 3.75a.75.75 0 0 1 .75.75v6.75h6.75a.75.75 0 0 1 0 1.5h-6.75v6.75a.75.75 0 0 1-1.5 0v-6.75H4.5a.75.75 0 0 1 0-1.5h6.75V4.5a.75.75 0 0 1 .75-.75Z" clip-rule="evenodd" />
                </svg>
                Agregar nueva cita
            </button>
        </div>
    </div>
    <div>
        
        <div class="dashboard">
            
            <table>
                <thead>
                    <th>Nombre</th>
                    <th>Apellidos</th>
                    <th>Fecha</th>
                    <th>Hora</th>
                    <th>Telefono</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </thead>
                <tbody id="tablaCitas">

                </tbody>
            </table>
        </div>
    </div>
</body>
<script src="JS/Dashboard.js"></script>
</html>
