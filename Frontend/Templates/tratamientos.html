<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestión de Tratamientos</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 30px; }
    .contenedor-form { max-width: 500px; margin-bottom: 20px; }
    input, textarea, button { display: block; width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    td button { display: inline-block; width: auto; margin: 0 5px 0 0; }
  </style>
</head>
<body>
  <h1>Gestión de Tratamientos</h1>

  <div class="contenedor-form">
    <div class="grupo-datos">
      <label for="nombre">Nombre</label>
      <input type="text" id="nombre" placeholder="Limpieza dental" required />
    </div>
    <div class="grupo-datos">
      <label for="descripcion">Descripción</label>
      <textarea id="descripcion" placeholder="Descripción del tratamiento" required></textarea>
    </div>
    <div class="grupo-datos">
      <label for="precio">Precio</label>
      <input type="number" id="precio" placeholder="500.00" step="0.01" min="0" required />
    </div>
    <button id="btn_guardar">Guardar tratamiento</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Descripción</th>
        <th>Precio</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tablaTratamientos"></tbody>
  </table>

  <script type="module" src="../JS/api/tratamientos.api.js"></script>
</body>
</html>
