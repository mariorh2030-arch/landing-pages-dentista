<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestión de Tratamientos</title>
  <style>
    :root {
      --primary: #0f766e;
      --primary-dark: #115e59;
      --accent: #14b8a6;
      --secondary: #f4fcfb;
      --text: #153b37;
      --muted: #5c7d79;
      --border: #d9efeb;
      --shadow: 0 20px 45px rgba(15, 118, 110, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top left, rgba(20, 184, 166, 0.16), transparent 24%), linear-gradient(135deg, #f8fffe 0%, #eaf8f6 100%);
      color: var(--text);
      padding: 32px 20px;
    }

    .page-actions {
      max-width: 1100px;
      margin: 0 auto 18px;
      display: flex;
      justify-content: flex-end;
    }

    .btn-abrir-modal {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      color: white;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(15, 118, 110, 0.2);
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(7, 34, 31, 0.62);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 1000;
    }

    .modal-card {
      width: min(900px, 100%);
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: 0 24px 60px rgba(7, 34, 31, 0.24);
      overflow: hidden;
      animation: modalIn 0.28s ease forwards;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: translateY(10px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px 0;
    }

    .modal-eyebrow {
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--accent);
    }

    .modal-header h2 {
      margin: 4px 0 0;
      font-size: 1.3rem;
      color: var(--primary-dark);
    }

    .modal-close {
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--secondary);
      color: var(--primary-dark);
      font-size: 1.25rem;
      cursor: pointer;
    }

    .contenedor-form {
      max-width: none;
      margin: 0;
      padding: 24px 24px 28px;
      background: transparent;
      border: none;
      border-radius: 0;
      box-shadow: none;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .grupo-datos {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .grupo-datos label {
      font-weight: 700;
      color: var(--primary-dark);
      font-size: 0.95rem;
    }

    .grupo-datos input,
    .grupo-datos textarea {
      width: 100%;
      padding: 13px 15px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--secondary);
      color: var(--text);
      outline: none;
      transition: all 0.2s ease;
      font-size: 0.96rem;
      resize: vertical;
      min-height: 46px;
    }

    .grupo-datos input:focus,
    .grupo-datos textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.11);
      background: white;
    }

    .grupo-datos:last-of-type,
    #btn_guardar {
      grid-column: 1 / -1;
    }

    #btn_guardar {
      padding: 14px 18px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(15, 118, 110, 0.22);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    #btn_guardar:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 28px rgba(15, 118, 110, 0.28);
    }

    table {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      border-collapse: collapse;
      background: rgba(255, 255, 255, 0.96);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    thead {
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      color: white;
    }

    th, td {
      padding: 14px 12px;
      text-align: left;
      border-bottom: 1px solid #e6f3f1;
    }

    th {
      font-weight: 700;
      font-size: 0.95rem;
    }

    tbody tr:hover {
      background: #f8fffe;
    }

    tbody tr:nth-child(even) {
      background: #fcfefe;
    }

    td button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      padding: 0;
      margin-right: 8px;
      font-weight: 600;
    }

    td button:first-child {
      background: #FEF3C7;
      color: #D97706;
    }

    td button:last-child {
      background: #FEE2E2;
      color: #DC2626;
    }

    .icons {
      width: 18px;
      height: 18px;
    }

    @media (max-width: 768px) {
      .contenedor-form {
        grid-template-columns: 1fr;
        padding: 20px;
      }

      .grupo-datos:last-of-type,
      #btn_guardar {
        grid-column: auto;
      }

      th, td {
        padding: 10px 8px;
      }
    }
  </style>
</head>
<body>
  <h1>Gestión de Tratamientos</h1>

  <div class="page-actions">
    <button type="button" id="btn_abrir_modal" class="btn-abrir-modal">+ Agregar tratamiento</button>
  </div>

  <div class="modal-overlay">
    <div class="modal-card">
      <div class="modal-header">
        <div>
          <p class="modal-eyebrow">Gestión clínica</p>
          <h2>Registrar tratamiento</h2>
        </div>
        <button type="button" class="modal-close" id="btn_cerrar_modal" aria-label="Cerrar">×</button>
      </div>

      <div class="contenedor-form">
        <div class="grupo-datos">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" placeholder="Limpieza dental" required />
        </div>
        <div class="grupo-datos">
          <label for="descripcion">Descripción</label>
          <textarea id="descripcion" placeholder="Descripción del tratamiento" required></textarea>
        </div>
        <div class="grupo-datos">
          <label for="precio">Precio</label>
          <input type="number" id="precio" placeholder="500.00" step="0.01" min="0" required />
        </div>
        <button id="btn_guardar">Guardar tratamiento</button>
      </div>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Descripción</th>
        <th>Precio</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tablaTratamientos"></tbody>
  </table>

  <script type="module" src="../JS/api/tratamientos.api.js"></script>
</body>
</html>
