<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="contenedor-form">
        <div class="grupo-datos">
            <label for="">Nombre</label>
            <input type="text" id="nombre" placeholder="Juan Alberto">
        </div>

        <div class="grupo-datos">
            <label for="">Apellidos</label>
            <input type="text" id="apellidos" placeholder="Rodriguez Hernandez">
        </div>

        <div class="grupo-datos span-2">
            <label for="">Numero telefono</label>
            <input type="number" id="numero" placeholder="961669933">
        </div>


        <div class="grupo-datos span-2">
            <label for="">Correo</label>
            <input type="email" id="correo" placeholder="ejemplo@gmail.com">
        </div>

        <div class="grupo-datos span-2">
            <label for="">Fecha de nacimiento</label>
            <input type="date" id="fecha" ">
        </div>

        <button id="btn_guardar" class="span-2">Agendar cita</button>

    </div>

    <div>
        <div class="dashboard">
            
            <table border="1">
                <thead>
                    <th>Nombre</th>
                    <th>Apellidos</th>
                    <th>Telefono</th>
                    <th>Correo</th>
                    <th>Fecha nacimiento</th>
                    <th>Acciones</th>
                </thead>
                <tbody id="tablaPacientes">

                </tbody>
            </table>
        </div>
    </div>
</body>
<script type="module" src="../JS/api/pacientes.api.js"></script>
</html>
